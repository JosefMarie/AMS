{% extends 'base.html' %}

{% block content %}
<div class="h-[calc(100vh-5rem)] flex items-center justify-center px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Bubble Animation Background -->
    <ul class="circles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <div class="glass-card w-full max-w-md p-10 animate-fadeIn overflow-hidden relative z-10">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500 rounded-full blur-3xl opacity-20 animate-float">
        </div>

        <div class="text-center mb-10 relative z-10">
            <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-2">Sign In</h2>
            <p class="text-sm text-gray-500 font-medium">Access your Academic Management Portal</p>
        </div>

        <form method="post" class="space-y-6 relative z-10">
            {% csrf_token %}
            <div class="space-y-2">
                <label
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input type="text" name="username" required
                        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-transparent focus:ring-2 focus:ring-indigo-500 transition-all font-medium bg-gray-50/50"
                        placeholder="your_username">
                </div>
            </div>

            <div class="space-y-2">
                <label
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" name="password" required
                        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-transparent focus:ring-2 focus:ring-indigo-500 transition-all font-medium bg-gray-50/50"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="btn-premium w-full py-4 text-center justify-center text-lg">
                    Authenticate
                </button>
            </div>

            <div class="text-center mt-6">
                <a href="#"
                    class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-all uppercase tracking-widest">Forgot
                    Password?</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
