{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto py-12 px-6 animate-fadeIn">
    <div class="mb-12">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight leading-none mb-2">Upload Resource</h1>
        <p class="text-gray-500 font-bold text-sm tracking-wide uppercase">Add study materials for your students</p>
    </div>

    <div
        class="glass-card p-10 bg-white/40 backdrop-blur-xl border border-white/40 shadow-2xl relative overflow-hidden">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Course
                        Module</label>
                    {{ form.module }}
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Resource
                        Title</label>
                    {{ form.title }}
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">File Upload
                        (PDF)</label>
                    {{ form.file }}
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Video Tutorial
                        URL</label>
                    {{ form.video_url }}
                </div>
            </div>

            <div class="pt-8 border-t border-gray-100 flex gap-4">
                <button type="submit"
                    class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg hover:scale-[1.02] active:scale-[0.98]">
                    Publish Resource
                </button>
                <a href="{% url 'resource_library' %}"
                    class="px-8 py-4 bg-gray-50 text-gray-400 rounded-2xl font-black uppercase tracking-widest hover:bg-gray-100 transition-all">
                    Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
