{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-gray-900">Enter Student Marks</h2>

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Student</label>
            {{ form.student }}
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Assessment Title</label>
            {{ form.assessment_title }}
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Score</label>
            {{ form.score }}
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Total Marks</label>
            {{ form.total_marks }}
        </div>

        <button type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            Save Marks
        </button>
    </form>
</div>
{% endblock %}
