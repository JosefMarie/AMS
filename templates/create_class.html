{% extends 'base.html' %}
{% block content %}
<div class="animate-fadeIn max-w-lg mx-auto">
    <div class="glass-card p-8">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Create New Class</h1>
            <p class="text-gray-500 font-bold text-sm">Set up a new classroom space for your students.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-6">
                <label for="class_name" class="block text-sm font-bold text-gray-700 mb-2">Class Name *</label>
                <input type="text" id="class_name" name="class_name" required
                    placeholder="e.g., Level 3 Software Development"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
            </div>

            <div class="flex gap-3 mt-8">
                <button type="submit"
                    class="px-6 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 w-full">
                    Create Classroom
                </button>
            </div>
            <div class="mt-4 text-center">
                <a href="{% url 'dashboard' %}"
                    class="text-sm font-bold text-gray-500 hover:text-indigo-600 transition-colors">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
