{% extends 'base.html' %}
{% block content %}
<div class="animate-fadeIn max-w-2xl mx-auto py-12">
    <div class="flex items-center gap-4 mb-12">
        <a href="{% url 'upload_curriculum' %}"
            class="p-3 rounded-2xl bg-white border border-gray-100 text-gray-400 hover:text-indigo-600 hover:border-indigo-100 transition-all shadow-sm">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
        <div>
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight leading-none mb-2">Create New Trade</h1>
            <p class="text-gray-500 font-bold text-sm tracking-wide uppercase">Add a new TVET sector specialization</p>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="px-8 py-6 border-b border-gray-100 bg-white/50">
            <h3 class="text-lg font-bold text-gray-900 font-extrabold italic uppercase tracking-tighter">Trade Details
            </h3>
        </div>

        <form method="post" class="p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Trade Name</label>
                <input type="text" name="name" placeholder="e.g., Software Development Level 4"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all text-sm text-gray-700"
                    required>
                <p class="text-[10px] text-gray-400 font-bold mt-2">This is the official name of the trade or qualification.</p>
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Sector (Optional)</label>
                <input type="text" name="sector" placeholder="e.g., Information and Communication Technology (ICT)"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all text-sm text-gray-700">
            </div>

            <div class="pt-6 border-t border-gray-100 flex justify-end">
                <button type="submit"
                    class="px-8 py-4 rounded-2xl bg-indigo-600 text-white font-black uppercase tracking-widest text-sm hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 flex items-center gap-3 group">
                    Save Trade
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
