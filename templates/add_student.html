{% extends 'base.html' %}
{% block content %}
<div class="animate-fadeIn max-w-2xl mx-auto">
    <div class="glass-card p-8">
        <div class="mb-8 flex items-center gap-4">
            <a href="{% url 'manage_class' classroom.id %}" class="p-2.5 bg-white rounded-2xl text-gray-400 hover:text-indigo-600 transition-all shadow-sm border border-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 mb-1">Add Student</h1>
                <p class="text-gray-500 font-bold text-sm uppercase tracking-widest">Classroom: <span class="text-indigo-600">{{ classroom.name }}</span></p>
            </div>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-bold text-gray-700 mb-2">Username *</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="first_name" class="block text-sm font-bold text-gray-700 mb-2">First Name *</label>
                        <input type="text" id="first_name" name="first_name" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
                    </div>
                    <div>
                        <label for="last_name" class="block text-sm font-bold text-gray-700 mb-2">Last Name *</label>
                        <input type="text" id="last_name" name="last_name" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
                    </div>
                </div>

                <div>
                    <label for="sex" class="block text-sm font-bold text-gray-700 mb-2">Sex *</label>
                    <select id="sex" name="sex" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
                        <option value="">Select...</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
                    <p class="text-sm text-amber-800 font-medium">
                        <strong>Note:</strong> The default password for new students is <code
                            class="bg-amber-100 px-2 py-1 rounded font-bold">student123</code>
                    </p>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button type="submit"
                    class="px-6 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                    Add Student
                </button>
                <a href="{% url 'manage_class' classroom.id %}"
                    class="px-6 py-3 rounded-xl bg-gray-200 text-gray-700 font-bold hover:bg-gray-300 transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
