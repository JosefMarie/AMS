{% extends 'base.html' %}
{% block content %}
<div class="animate-fadeIn max-w-2xl mx-auto">
    <div class="glass-card p-8">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Add Module</h1>
            <p class="text-gray-500 font-bold text-sm">Classroom: <span class="text-indigo-600">{{ classroom.name
                    }}</span></p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label for="module_code" class="block text-sm font-bold text-gray-700 mb-2">Module Code *</label>
                    <input type="text" id="module_code" name="module_code" required placeholder="e.g., M01, SOD101"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
                    <p class="text-xs text-gray-500 mt-1 font-medium">Unique identifier for the module</p>
                </div>

                <div>
                    <label for="module_name" class="block text-sm font-bold text-gray-700 mb-2">Module Name *</label>
                    <input type="text" id="module_name" name="module_name" required
                        placeholder="e.g., Software Development"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-medium">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button type="submit"
                    class="px-6 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                    Add Module
                </button>
                <a href="{% url 'manage_class' classroom.id %}"
                    class="px-6 py-3 rounded-xl bg-gray-200 text-gray-700 font-bold hover:bg-gray-300 transition-all">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
