{% extends 'base.html' %}

{% block content %}
<div class="h-[calc(100vh-5rem)] flex items-center justify-center px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="glass-card w-full max-w-md p-10 animate-fadeIn overflow-hidden relative z-10 text-center">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-green-500 rounded-full blur-3xl opacity-20 animate-float"></div>

        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>

        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-3">Password Updated!</h2>
        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            Your password has been successfully reset.<br>
            You can now sign in with your new password.
        </p>

        <a href="{% url 'login' %}" class="btn-premium w-full py-4 text-center justify-center text-base inline-block">
            Sign In Now
        </a>
    </div>
</div>
{% endblock %}
