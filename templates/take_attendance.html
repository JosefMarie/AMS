{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-lg">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Attendance: {{ classroom.name }}</h2>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-6 flex items-end gap-4">
            <div class="flex-grow"><label class="block text-gray-700 text-sm font-bold mb-2">Date</label><input
                    type="date" name="date" value="{{ date }}"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <button type="submit" name="load_date" value="true"
                class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Load
                Date</button>
        </div>

        {% if students %}
        <div class="overflow-x-auto mb-6">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Student ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            Status</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    {% for s in students %}<tr>
                        <!-- beautify ignore:start -->
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ s.sid }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ s.name }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"><div class="flex space-x-4">
                        <label class="inline-flex items-center"><input type="radio" name="status_{{ s.id }}" value="PRESENT" class="form-radio text-indigo-600" {% if s.status == 'PRESENT' %}checked{% endif %}><span class="ml-2">Present</span></label>
                        <label class="inline-flex items-center"><input type="radio" name="status_{{ s.id }}" value="ABSENT" class="form-radio text-red-600" {% if s.status == 'ABSENT' %}checked{% endif %}><span class="ml-2">Absent</span></label>
                        <label class="inline-flex items-center"><input type="radio" name="status_{{ s.id }}" value="LATE" class="form-radio text-yellow-600" {% if s.status == 'LATE' %}checked{% endif %}><span class="ml-2">Late</span></label>
                    </div></td>
                    <!-- beautify ignore:end -->
                    </tr>{% endfor %}
                </tbody>
            </table>
        </div>
        <div class="flex justify-end"><button type="submit" name="save_attendance" value="true"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded focus:outline-none focus:shadow-outline">Save
                Attendance</button></div>
        {% else %}<p class="text-gray-500 text-center py-4">No students found.</p>{% endif %}
    </form>
</div>
{% endblock %}
