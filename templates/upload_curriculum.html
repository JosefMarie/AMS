{% extends 'base.html' %}
{% block content %}
<div class="animate-fadeIn max-w-2xl mx-auto py-12">
    <div class="flex items-center gap-4 mb-12">
        <a href="{% url 'dashboard' %}"
            class="p-3 rounded-2xl bg-white border border-gray-100 text-gray-400 hover:text-indigo-600 hover:border-indigo-100 transition-all shadow-sm">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
        <div>
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight leading-none mb-2">Upload Syllabus</h1>
            <p class="text-gray-500 font-bold text-sm tracking-wide uppercase">AI-Powered Curriculum Extraction</p>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="px-8 py-6 border-b border-gray-100 bg-white/50">
            <h3 class="text-lg font-bold text-gray-900 font-extrabold italic uppercase tracking-tighter">Curriculum Details
            </h3>
        </div>

        <form method="post" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}

            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="block text-xs font-black uppercase tracking-widest text-gray-400">Select Trade</label>
                    <a href="{% url 'create_trade' %}" class="text-xs font-bold text-indigo-500 hover:text-indigo-700 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Create New Trade
                    </a>
                </div>
                <select name="trade" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all text-sm text-gray-700" required>
                    <option value="">-- Choose a Trade --</option>
                    {% for trade in trades %}
                        <option value="{{ trade.id }}">{{ trade.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Curriculum Title</label>
                <input type="text" name="title" placeholder="e.g., RTQF Level 4 Software Development 2026"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all"
                    required>
            </div>
            
            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Qualification Level (Optional)</label>
                <select name="qualification_level" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all text-sm text-gray-700">
                    <option value="">-- Select Level --</option>
                    <option value="Level 1">Level 1</option>
                    <option value="Level 2">Level 2</option>
                    <option value="Level 3">Level 3</option>
                    <option value="Level 4">Level 4</option>
                    <option value="Level 5">Level 5</option>
                    <option value="Level 6">Level 6</option>
                    <option value="Level 7">Level 7</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Upload PDF Syllabus</label>
                <input type="file" name="pdf_file" accept=".pdf"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all bg-gray-50 text-sm"
                    required>
                <p class="text-xs text-indigo-500 font-medium mt-2 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    The AI will extract Modules, Learning Outcomes, and Topics automatically!
                </p>
            </div>

            <div class="pt-6 border-t border-gray-100 flex justify-end">
                <button type="submit" onclick="this.innerHTML='Extracting... Please wait...'; this.style.opacity='0.7'; this.form.submit();"
                    class="px-8 py-4 rounded-2xl bg-indigo-600 text-white font-black uppercase tracking-widest text-sm hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 flex items-center gap-3 group">
                    Extract Syllabus
                    <svg class="w-5 h-5 group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
