{% extends 'base.html' %}
{% block content %}
<div class="animate-fadeIn max-w-4xl mx-auto">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight leading-none mb-4">Bulk Grade Import</h1>
        <p class="text-gray-500 font-bold text-sm tracking-wide uppercase">Instantly update student profiles via CSV</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
        <!-- Template Generator Section -->
        <div class="glass-card p-8 bg-white/50 border border-white/40 shadow-xl">
            <h3 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                1. Generate Template
            </h3>
            <form method="get" action="" class="space-y-4">
                <input type="hidden" name="download_template" value="1">
                
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Select Class</label>
                    <select name="classroom" id="classroomSelect" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all font-bold">
                        <option value="">Choose a classroom...</option>
                        {% for classroom in classrooms %}
                        <option value="{{ classroom.id }}">{{ classroom.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Select Module</label>
                    <select name="module" id="moduleSelect" required disabled
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all font-bold disabled:opacity-50">
                        <option value="">First select a class...</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Assessment Title</label>
                        <input type="text" name="assessment_title" placeholder="e.g. Midterm" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Assessment Type</label>
                        <select name="assessment_type" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all font-bold">
                            <option value="FA">Formative (FA)</option>
                            <option value="IA">Integrated (IA)</option>
                            <option value="SA">Summative (SA)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Total Marks</label>
                        <input type="number" name="total_marks" value="100" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 focus:border-indigo-600 transition-all font-bold">
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-4 bg-white border-2 border-indigo-600 text-indigo-600 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-50 transition-all flex items-center justify-center gap-3 mt-4">
                    Download Pre-filled CSV
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                </button>
            </form>
        </div>

        <!-- Upload Section -->
        <div class="glass-card p-8 bg-white shadow-2xl border-indigo-100">
            <h3 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                2. Upload & Process
            </h3>
            <form method="post" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                <div class="relative group">
                    <input type="file" name="csv_file" id="csv_file" class="hidden" accept=".csv" required
                        onchange="updateFileName()">
                    <label for="csv_file"
                        class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-gray-100 rounded-3xl cursor-pointer bg-gray-50/30 hover:bg-white hover:border-indigo-300 transition-all">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-10 h-10 text-gray-300 group-hover:text-indigo-400 mb-3" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                            </svg>
                            <p class="text-sm text-gray-500 font-bold" id="fileName">Select Filled CSV</p>
                            <p class="text-xs text-gray-400 mt-1 font-medium text-center px-4">Upload the file you just downloaded and filled</p>
                        </div>
                    </label>
                </div>
                <button type="submit"
                    class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-3 group">
                    Start Bulk Import
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Instructions Summary -->
    <div class="glass-card p-6 bg-slate-900 text-white border-0 shadow-xl flex items-center justify-between gap-6">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-white/10 rounded-xl">
                <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div>
                <p class="text-xs font-black uppercase tracking-widest text-indigo-300">Quick Guide</p>
                <p class="text-sm text-slate-300 font-medium">1. Generate template &rarr; 2. Fill 'Score' column &rarr; 3. Upload here.</p>
            </div>
        </div>
        <div class="hidden md:block">
            <span class="text-[10px] font-black uppercase tracking-widest opacity-40">System Auto-Matches Student IDs</span>
        </div>
    </div>
</div>

    <div id="classroom-modules-data" class="hidden" data-map="{{ mapping_json|escape }}"></div>

    <script>
        var classroomModules = {};
        try {
            var mapEl = document.getElementById('classroom-modules-data');
            classroomModules = JSON.parse(mapEl.getAttribute('data-map'));
        } catch(e) {
            console.error("Error parsing mapping:", e);
        }

    const classroomSelect = document.getElementById('classroomSelect');
    const moduleSelect = document.getElementById('moduleSelect');

    classroomSelect.addEventListener('change', function() {
        const classroomId = this.value;
        moduleSelect.innerHTML = '<option value="">Choose a module...</option>';
        
        if (classroomId && classroomModules[classroomId]) {
            classroomModules[classroomId].forEach(module => {
                const option = document.createElement('option');
                option.value = module.id;
                option.textContent = module.name;
                moduleSelect.appendChild(option);
            });
            moduleSelect.disabled = false;
        } else {
            moduleSelect.innerHTML = '<option value="">First select a class...</option>';
            moduleSelect.disabled = true;
        }
    });

    function updateFileName() {
        const input = document.getElementById('csv_file');
        const fileName = document.getElementById('fileName');
        fileName.textContent = input.files[0] ? input.files[0].name : 'Select Filled CSV';
    }
</script>
{% endblock %}
